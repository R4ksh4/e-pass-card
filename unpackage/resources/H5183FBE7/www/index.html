<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>媒体播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui;
        }
        video, img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 50px;
            margin: 0 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
        }
        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
        .lock-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
        }
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="container" style="width:100%; text-align:center; color:white;">
        <p>点击下方按钮选择照片或视频</p>
    </div>
    <div class="controls">
        <button id="imageBtn">📷 图片</button>
        <button id="videoBtn">🎬 视频</button>
        <button id="fullscreenBtn">🖥️ 全屏</button>
    </div>
    <div class="status" id="status">就绪</div>
    <div class="lock-btn" id="lockBtn">🔓</div>
    <div class="toast" id="toast">提示</div>

    <script>
        let currentMedia = null;
        let isLocked = false;
        
        // ========== 存储 key ==========
        const STORAGE_LAST_PATH = 'lastMediaPath';
        const STORAGE_LAST_TYPE = 'lastMediaType';
        
        // ========== Toast ==========
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 1500);
        }
        
        // ========== 显示媒体（同时保存记忆） ==========
        function showMedia(path, type) {
            // 保存记忆
            plus.storage.setItem(STORAGE_LAST_PATH, path);
            plus.storage.setItem(STORAGE_LAST_TYPE, type);
            
            document.getElementById('status').innerText = '加载: ' + path;
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            if (type === 'image') {
                const img = new Image();
                img.src = path;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100vh';
                container.appendChild(img);
                currentMedia = img;
            } else {
                const video = document.createElement('video');
                video.src = path;
                video.controls = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '100vh';
                video.autoplay = true;
                container.appendChild(video);
                currentMedia = video;
            }
            document.getElementById('status').innerText = '完成';
        }
        
        // ========== 恢复上次播放 ==========
        function restoreLastMedia() {
            const lastPath = plus.storage.getItem(STORAGE_LAST_PATH);
            const lastType = plus.storage.getItem(STORAGE_LAST_TYPE);
            
            if (lastPath && lastType) {
                showToast('恢复上次播放的内容');
                showMedia(lastPath, lastType);
            } else {
                showToast('无历史记录，请选择照片或视频');
            }
        }
        
        // ========== 包装函数（带锁定检查） ==========
        function selectImage() {
            if (isLocked) {
                showToast('🔒 设备已锁定，请长按三指3秒解锁');
                return;
            }
            plus.gallery.pick(function(path) {
                showMedia(path, 'image');
            }, function(e) {
                document.getElementById('status').innerText = '取消选择';
            }, { filter: 'image' });
        }
        
        function selectVideo() {
            if (isLocked) {
                showToast('🔒 设备已锁定，请长按三指3秒解锁');
                return;
            }
            plus.gallery.pick(function(path) {
                showMedia(path, 'video');
            }, function(e) {
                document.getElementById('status').innerText = '取消选择';
            }, { filter: 'video' });
        }
        
        function toggleFullscreen() {
            if (isLocked) {
                showToast('🔒 设备已锁定，请长按三指3秒解锁');
                return;
            }
            if (currentMedia) {
                if (currentMedia.requestFullscreen) {
                    currentMedia.requestFullscreen();
                } else if (currentMedia.webkitRequestFullscreen) {
                    currentMedia.webkitRequestFullscreen();
                }
            }
        }
        
        // ========== 锁定逻辑 ==========
        const lockBtn = document.getElementById('lockBtn');
        lockBtn.addEventListener('click', function() {
            if (!isLocked) {
                isLocked = true;
                lockBtn.innerHTML = '🔒';
                showToast('🔒 已锁定，三指长按3秒解锁');
            } else {
                showToast('🔒 请长按三指3秒解锁');
            }
        });
        
        let threeFingerTimer = null;
        document.body.addEventListener('touchstart', function(e) {
            if (!isLocked) return;
            if (e.touches.length === 3) {
                if (threeFingerTimer) clearTimeout(threeFingerTimer);
                threeFingerTimer = setTimeout(function() {
                    isLocked = false;
                    lockBtn.innerHTML = '🔓';
                    showToast('🔓 已解锁');
                    threeFingerTimer = null;
                }, 3000);
            }
        });
        
        document.body.addEventListener('touchend', function() {
            if (threeFingerTimer) {
                clearTimeout(threeFingerTimer);
                threeFingerTimer = null;
            }
        });
        
        document.body.addEventListener('touchcancel', function() {
            if (threeFingerTimer) {
                clearTimeout(threeFingerTimer);
                threeFingerTimer = null;
            }
        });
        
        // ========== 绑定按钮 ==========
        document.getElementById('imageBtn').onclick = selectImage;
        document.getElementById('videoBtn').onclick = selectVideo;
        document.getElementById('fullscreenBtn').onclick = toggleFullscreen;
        
        // ========== 锁定竖屏 ==========
        plus.screen.lockOrientation('portrait-primary');
        
        // ========== 启动时恢复上次播放 ==========
        document.addEventListener('plusready', function() {
            restoreLastMedia();
        });
        
        showToast('✅ 就绪，已开启记忆功能');
    </script>
</body>
</html>
